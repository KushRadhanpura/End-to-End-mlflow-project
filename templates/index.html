<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <title>Wine Quality Prediction</title>
        <link rel="icon" type="image/x-icon" href="static/assets/favicon.ico" />
        <script src="https://use.fontawesome.com/releases/v5.15.3/js/all.js" crossorigin="anonymous"></script>
        <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700" rel="stylesheet" />
        <link href="static/css/styles.css" rel="stylesheet" />
        <style>
            .form-container { background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 15px; box-shadow: 0px 4px 15px rgba(0,0,0,0.2); margin-top: -50px; position: relative; z-index: 10; }
            .form-control { border-radius: 8px; margin-bottom: 15px; }
            .btn-predict { background-color: #722f37; color: white; font-weight: bold; width: 100%; border-radius: 8px; padding: 12px; border: none; }
            .btn-predict:hover { background-color: #511f24; color: white; }
            label { font-weight: 600; color: #333; font-size: 0.9rem; }
        </style>
    </head>
    <body class="bg-light">
        <nav class="navbar navbar-expand-lg navbar-light" id="mainNav">
            <div class="container px-4 px-lg-5">
                <a class="navbar-brand" href="/">Home</a>
            </div>
        </nav>
        
        <header class="masthead" style="background-image: url('static/assets/img/wine.gif'); padding: 8rem 0;">
            <div class="container position-relative px-4 px-lg-5">
                <div class="row gx-4 gx-lg-5 justify-content-center">
                    <div class="col-md-10 col-lg-8 col-xl-7 text-center text-white">
                        <div class="site-heading">
                            <h1>Wine Quality Predictor</h1>
                            <span class="subheading">Enter the chemical properties below</span>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <div class="container px-4 px-lg-5 mb-5">
            <div class="row gx-4 gx-lg-5 justify-content-center">
                <div class="col-lg-8">
                    <form action="/predict" method="POST" class="form-container">
                        <div class="row">
                            <div class="col-md-6">
                                <label>Fixed Acidity</label>
                                <input type="number" step="any" name="fixed_acidity" class="form-control" placeholder="e.g. 7.4" required>
                            </div>
                            <div class="col-md-6">
                                <label>Volatile Acidity</label>
                                <input type="number" step="any" name="volatile_acidity" class="form-control" placeholder="e.g. 0.70" required>
                            </div>
                            <div class="col-md-6">
                                <label>Citric Acid</label>
                                <input type="number" step="any" name="citric_acid" class="form-control" placeholder="e.g. 0.00" required>
                            </div>
                            <div class="col-md-6">
                                <label>Residual Sugar</label>
                                <input type="number" step="any" name="residual_sugar" class="form-control" placeholder="e.g. 1.9" required>
                            </div>
                            <div class="col-md-6">
                                <label>Chlorides</label>
                                <input type="number" step="any" name="chlorides" class="form-control" placeholder="e.g. 0.076" required>
                            </div>
                            <div class="col-md-6">
                                <label>Free Sulfur Dioxide</label>
                                <input type="number" step="any" name="free_sulfur_dioxide" class="form-control" placeholder="e.g. 11.0" required>
                            </div>
                            <div class="col-md-6">
                                <label>Total Sulfur Dioxide</label>
                                <input type="number" step="any" name="total_sulfur_dioxide" class="form-control" placeholder="e.g. 34.0" required>
                            </div>
                            <div class="col-md-6">
                                <label>Density</label>
                                <input type="number" step="any" name="density" class="form-control" placeholder="e.g. 0.9978" required>
                            </div>
                            <div class="col-md-6">
                                <label>pH</label>
                                <input type="number" step="any" name="pH" class="form-control" placeholder="e.g. 3.51" required>
                            </div>
                            <div class="col-md-6">
                                <label>Sulphates</label>
                                <input type="number" step="any" name="sulphates" class="form-control" placeholder="e.g. 0.56" required>
                            </div>
                            <div class="col-md-6 mx-auto">
                                <label>Alcohol</label>
                                <input type="number" step="any" name="alcohol" class="form-control" placeholder="e.g. 9.4" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-predict mt-3">Predict Quality Score</button>
                    </form>
                </div>
            </div>
        </div>

        <footer class="border-top py-4 bg-light">
            <div class="container px-4 px-lg-5 text-center">
                <div class="small text-muted">© 2026 Wine Predictor App. All rights reserved.</div>
            </div>
        </footer>
    </body>
</html>
